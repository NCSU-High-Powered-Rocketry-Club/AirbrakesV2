name: Prek checks

on:
  pull_request:
    branches:
      - '**'  # Matches all branch names, for PRs
  push:
    branches:
      - 'main'  # Run tests on main branch

jobs:
  prek:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: j178/prek-action@v1